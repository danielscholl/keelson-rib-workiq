name: Bug report
description: Something in the WorkIQ rib isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This is a [Keelson](https://github.com/danielscholl/keelson)
        rib — please confirm it still reproduces on the latest release first. For a
        security issue, do **not** file here — see this repo's
        [SECURITY.md](https://github.com/danielscholl/keelson-rib-workiq/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: The actual behavior, with the exact tool call (e.g. `workiq_ask`) or boot step that triggered it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. KEELSON_RIBS=workiq bun dev  (or `keelson rib add …`)
        2. ask the chat to use workiq_ask ("what's on my calendar today?")
        3. ...
    validations:
      required: true
  - type: textarea
    id: debug
    attributes:
      label: Handshake / child output (if the rib registered no tools)
      description: Re-run with `KEELSON_WORKIQ_DEBUG=1` and paste the WorkIQ child's stderr plus the rib's boot warning line. Redact anything sensitive.
      render: text
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: The rib version (or commit), your keelson version, OS, Bun version, and how WorkIQ launches — global `workiq` on PATH (`workiq --version`) or the npx fallback, plus any `KEELSON_WORKIQ_*` env overrides.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before filing
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: WorkIQ itself works outside keelson (`workiq mcp` starts, you are signed in) — this is a rib bug, not a WorkIQ CLI or harness issue.
          required: false
