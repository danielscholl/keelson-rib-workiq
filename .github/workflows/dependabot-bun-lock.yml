name: Dependabot bun.lock sync

# Dependabot's npm ecosystem bumps package.json in the root and docs/ projects
# but cannot update Bun's bun.lock, so its PRs fail CI's `bun install
# --frozen-lockfile`. This job regenerates both lockfiles and uploads them as
# an artifact — it never writes to the repo. The privileged
# dependabot-bun-lock-push.yml workflow (triggered by this one's completion)
# applies the artifact to the PR branch via the Contents API, so a checkout of
# the PR's untrusted head never happens in a job that holds write access or
# secrets (see the actions/untrusted-checkout CodeQL rule this split resolves).

on:
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lockfile:
    name: Regenerate bun.lock
    # Gate on Dependabot's immutable numeric user id, not the spoofable
    # `github.actor` string (49699333 is the dependabot[bot] account).
    if: github.event.pull_request.user.id == 49699333
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Match ci.yml so the lockfile is generated by the validated runtime.
          bun-version: 1.3.13

      - name: Regenerate lockfiles from the bumped manifests
        run: |
          bun install --lockfile-only
          if [ -f docs/package.json ]; then
            (cd docs && bun install --lockfile-only)
          fi

      - name: Check for lockfile drift
        id: diff
        run: |
          if git diff --quiet -- bun.lock docs/bun.lock; then
            echo "lockfiles already in sync with package.json — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Save PR branch metadata
        if: steps.diff.outputs.changed == 'true'
        run: |
          mkdir -p pr
          echo "${{ github.head_ref }}" > pr/HEAD_REF

      - name: Upload lockfile artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bun-lock
          path: |
            pr/HEAD_REF
            bun.lock
            docs/bun.lock
          if-no-files-found: warn
          retention-days: 1
