name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      # Drift originates in the rib, not the docs: a PR that adds a view,
      # workflow, key, or tool must run the drift check that fails when the
      # docs never learned about it. Validation only — deploy is gated to
      # non-PR events below, so a src change never redeploys the site.
      - "src/**"
      - "bin/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the runtime Keelson validates against, matching ci.yml.
          bun-version: 1.3.13

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: docs
        run: bun run build

      # Cross-checks the built llms-full.txt against src/: a view, workflow,
      # key, or tool that ships without reaching the docs fails here.
      - name: Check docs for drift
        working-directory: docs
        run: bun scripts/check-docs-drift.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    # Build runs on PRs too (validation); only deploy from main / manual runs.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
