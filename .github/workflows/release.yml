name: Release

# Release-please watches main: conventional commits accumulate into a release
# PR (version bump + CHANGELOG); merging that PR creates the tag and the GitHub
# Release. A rib installs from source (`keelson rib add <repo>`), so there are
# no build artifacts to attach — the tag and the generated notes are the whole
# release. (The base keelson repo adds a publish job here because it ships a CLI
# bundle; a rib has nothing to bundle.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # A RELEASE_PLEASE_TOKEN PAT (optional) makes CI run on the release
          # PR; with the default GITHUB_TOKEN the PR gets no workflow runs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Catch a silently-dropped release: if a release PR merges without its
  # `autorelease: pending` label (a GitHub label-API flake at PR-creation time
  # can strip it), release-please bumps the manifest on main but never tags the
  # release — a green run with no release. Assert the manifest version has a
  # matching GitHub Release so that turns into a red build instead of a gap.
  verify-release:
    name: Verify release exists for manifest version
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Assert a GitHub Release exists for the manifest version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(jq -r '.["."]' .release-please-manifest.json)"
          tag="v${version}"
          # release-please creates the Release in the job above; retry to ride
          # out GitHub's eventual consistency before failing.
          for attempt in 1 2 3; do
            if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "ok: release ${tag} exists for manifest version ${version}"
              exit 0
            fi
            echo "attempt ${attempt}: ${tag} not visible yet; retrying in 5s"
            sleep 5
          done
          echo "::error::.release-please-manifest.json is at ${version} but no ${tag} release exists — a release was silently dropped. Most likely a release PR merged without its 'autorelease: pending' label; re-label the merged release PR and re-run this workflow to recover it." >&2
          exit 1
